name: data_cleanup_job-cd

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches:
      - master
      - main
    paths:
      - python/common/**
      - python/data_cleanup_job/**
      - .github/workflows/data_cleanup_job-cd.yml
      - trigger.txt

jobs:
  CD:
    permissions:
      contents: read
    uses: ./.github/workflows/cd-workflow.yml
    with:
      DOCKER_CONTEXT: python
      DOCKER_FILE: python/data_cleanup_job/dockerfile
      DOCKER_IMAGE_NAME: rsbc-df-data-cleanup
      IMPORT_IMAGE_TO_OPENSHIFT: false
    secrets: inherit
